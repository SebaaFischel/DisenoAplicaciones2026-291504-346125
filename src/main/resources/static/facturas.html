<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso de Factura</title>
    <link rel="stylesheet" href="ingresoFactura.css"> 
    
</head>
<body>
    <script src="/utilesVista.js"></script>
    <h1><label>Ingreso de Factura:</label> <span id="totalFacturado">  </span></h1>

    <!-- Detalles de la Factura -->
    <div class="factura-info">
        <form id="formCedula">
            <div class="acciones">
                <label for="cedula">Cédula:</label>
                <input type="number" id="cedula" name="cedula" required>
                <button type="submit" id="btnBuscarCedula">Buscar</button>
            </div>
        </form>
        <div><label>Cliente:</label> <span id="nombreCliente"> </span></div>
        
        <!-- Campo "Cédula" y botón "Buscar" -->
        

        <div><label>Fecha:</label> <span id="fechaFactura"> </span></div>
        <div class="total"><label>Total de la Factura:</label> <span id="totalFactura">  </span></div>
        </div>

    <!-- Caja de texto para "Código Producto" y "Cantidad" -->
    <div class="acciones">
        <form id="agregarProductoForm">
        <label>Código Producto:</label>
        <input type="number" id="codigoProducto" name="codigoProducto" placeholder="Ingrese código producto" required>
        <label>Cantidad:</label>
        <input type="number" id="cantidad" name="cantidad" placeholder="Cantidad" required>
        <button type="submit">Agregar Línea</button>
        </form>
    </div>

    <!-- Detalles de las Líneas -->
    <div class="lineas-info">
        <h2>Detalles de las Líneas</h2>
       <div id="divLineas"></div>
   </div>

    <!-- Botones Confirmar y Descartar -->
    <div class="botones">
        <button class="confirmar" id="btnConfirmar">Confirmar</button>
        <button class="descartar" id="btnDescartar">Descartar</button>
    </div>

    <script type="module">
        const spnTotalFacturado = document.getElementById("totalFacturado");
        const inpCedula         = document.getElementById("cedula");
        const spnNombreCliente  = document.getElementById("nombreCliente");
        const spnFechaFactura   = document.getElementById("fechaFactura");
        const spnTotalFactura   = document.getElementById("totalFactura");
        const frmCedula         = document.getElementById("formCedula");
        const frmAgregarProducto = document.getElementById("agregarProductoForm");
        const divLineas         = document.getElementById("divLineas");
        const btnConfirmar      = document.getElementById("btnConfirmar");
        const btnDescartar      = document.getElementById("btnDescartar");

        import CommandDispatcher from '/CommandDispatcher.js';

        const view = CommandDispatcher.registerView('ingresarFactura', {
            urlInicio: '/ingresarFactura/vistaConectada'
        });

        view.handler('totalFacturado', function(total) {
            spnTotalFacturado.innerHTML = ' - Total facturado $ ' + total;
        });
        view.handler('factura', function(factura) {
            inpCedula.value = factura.cedula;
            spnNombreCliente.innerHTML = factura.cliente;
            spnFechaFactura.innerHTML = factura.fecha;
            var totHtml = "";
            if (factura.total > 0) totHtml = "$ " + factura.total;
            spnTotalFactura.innerHTML = totHtml;
            divLineas.innerHTML = crearTablaDesdeJson(factura.lineas);
        });
        view.handler('mensaje', function(mensaje) {
            mostrarMensaje(mensaje);
        });

        frmCedula.addEventListener('submit', function(e) {
            e.preventDefault();
            CommandDispatcher.submit("/ingresarFactura/iniciarFactura", serializarFormulario('formCedula'));
        });
        frmAgregarProducto.addEventListener('submit', function(e) {
            e.preventDefault();
            CommandDispatcher.submit("/ingresarFactura/agregarProducto", serializarFormulario('agregarProductoForm'));
        });
        btnConfirmar.addEventListener('click', function() {
            CommandDispatcher.submit("/ingresarFactura/confirmarFactura", "");
        });
        btnDescartar.addEventListener('click', function() {
            CommandDispatcher.submit("/ingresarFactura/descartarFactura", "");
        });

        CommandDispatcher.startView(view);
    </script>

</body>
</html>
